{% extends "tools/_layout.html" %}
{% block tool %}
<p class="tool-desc">要件とテストケースを入力すると、トレーサビリティマトリクス（RTM）とカバレッジ・未カバー要件・孤立テストを算出します（ID解析／AIなし）。</p>
<form method="post" hx-post="." hx-target="#tool-result" hx-swap="innerHTML" hx-indicator="#tr-spin">
  {% csrf_token %}
  <div class="two-col">
    <div>
      <label class="lbl">要件（1行に <code>REQ-001, 要件名</code>）</label>
      <textarea name="req_text" class="tool-ta sm">{{ req_text }}</textarea>
    </div>
    <div>
      <label class="lbl">テスト（1行に <code>TC-001, REQ-001;REQ-002, テスト名</code>）</label>
      <textarea name="test_text" class="tool-ta sm">{{ test_text }}</textarea>
    </div>
  </div>
  <div class="tool-actions">
    <button class="btn-primary" type="submit">マトリクス生成</button>
    <span id="tr-spin" class="htmx-indicator spin">生成中…</span>
  </div>
</form>

<div id="tool-result">
  {% include "tools/_partials/traceability_result.html" %}
</div>
{% endblock %}
