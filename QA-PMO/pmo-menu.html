<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMOサービスメニュー</title>
  <!-- T-05: font-display:swap適用（NFR N-04） -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ── design-system: 業務PMO紺系トークン ── */
    :root {
      --md-primary:        #1a3a6b;
      --md-primary-light:  #2e5aa8;
      --md-primary-dark:   #0d2240;
      --md-bg:             #f0f2f7;
      --md-surface:        #ffffff;
      --md-surface-v:      #f7f8fc;
      --md-border:         #dde2ee;
      --md-divider:        #eaedf5;
      --md-text:           #1a1f2e;
      --md-text-secondary: #4a5568;
      --md-text-disabled:  #a0aec0;
      --md-accent:         #2e5aa8;
      --md-accent-light:   #e8edf8;
      --nav-w:             260px;
      --top-h:             60px;
      --r:                 10px;
      --r-sm:              6px;
      --el1: 0 1px 3px rgba(26,58,107,.08), 0 1px 2px rgba(26,58,107,.12);
      --el2: 0 3px 8px rgba(26,58,107,.10), 0 2px 4px rgba(26,58,107,.08);
      --el3: 0 8px 24px rgba(26,58,107,.12), 0 4px 8px rgba(26,58,107,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--md-bg);
      color: var(--md-text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* T-09: フォーカス可視化（WCAG 2.1 AA） */
    :focus-visible {
      outline: 3px solid var(--md-primary-light);
      outline-offset: 2px;
      border-radius: var(--r-sm);
    }

    /* ── Topbar ── */
    #topbar {
      height: var(--top-h);
      background: var(--md-primary);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: var(--el2);
      z-index: 200;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: rgba(255,255,255,.15);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .logo-text { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: .02em; }
    .logo-sub  { color: rgba(255,255,255,.55); font-size: 11px; margin-left: 2px; }

    /* T-07: 検索ボックス */
    #search-wrap {
      flex: 1;
      max-width: 320px;
      margin-left: auto;
      position: relative;
    }
    #search-input {
      width: 100%;
      padding: 7px 12px 7px 34px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      background: rgba(255,255,255,.12);
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: background .2s, border .2s;
    }
    #search-input::placeholder { color: rgba(255,255,255,.5); }
    #search-input:focus {
      background: rgba(255,255,255,.2);
      border-color: rgba(255,255,255,.5);
    }
    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px; color: rgba(255,255,255,.6);
      pointer-events: none;
    }
    #search-clear {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,.6);
      cursor: pointer; font-size: 14px;
      display: none;
    }
    #search-input:not(:placeholder-shown) ~ #search-clear { display: block; }

    /* ── Layout ── */
    #layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidenav ── */
    #sidenav {
      width: var(--nav-w);
      background: var(--md-surface);
      border-right: 1px solid var(--md-border);
      overflow-y: auto;
      flex-shrink: 0;
      padding-bottom: 24px;
    }
    #sidenav::-webkit-scrollbar { width: 4px; }
    #sidenav::-webkit-scrollbar-thumb { background: var(--md-border); border-radius: 2px; }

    .nav-home-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      margin: 12px 10px 4px;
      border-radius: var(--r-sm);
      cursor: pointer; border: none;
      background: var(--md-accent-light);
      color: var(--md-primary);
      font-family: inherit; font-size: 13px; font-weight: 600;
      width: calc(100% - 20px);
      transition: background .15s;
    }
    .nav-home-btn:hover { background: #d6e0f5; }
    .nav-home-btn.active { background: var(--md-primary); color: #fff; }

    .nav-category-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--md-text-disabled);
      padding: 16px 16px 6px;
      display: block;
    }
    .nav-section { margin: 2px 0; }
    .nav-section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px 9px 16px;
      cursor: pointer; user-select: none;
      transition: background .15s;
      border: none; background: none;
      width: 100%; font-family: inherit; text-align: left;
    }
    .nav-section-header:hover { background: var(--md-bg); }
    .section-icon {
      width: 28px; height: 28px; border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .section-label { font-size: 14px; font-weight: 600; color: var(--md-text); flex: 1; }
    .chevron { font-size: 9px; color: var(--md-text-disabled); transition: transform .2s; }
    .nav-section.open .chevron { transform: rotate(90deg); }

    .nav-sub-section { overflow: hidden; max-height: 0; transition: max-height .25s ease; }
    .nav-section.open > .nav-sub-section { max-height: 800px; }

    .nav-sub-header {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px 7px 34px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--md-text-secondary);
      transition: background .15s;
      border: none; background: none;
      width: 100%; font-family: inherit; text-align: left;
    }
    .nav-sub-header:hover { background: var(--md-bg); }
    .sub-chevron { font-size: 8px; color: var(--md-text-disabled); transition: transform .2s; margin-left: auto; }
    .nav-sub-section.open > .nav-sub-header .sub-chevron { transform: rotate(90deg); }

    .nav-items { overflow: hidden; max-height: 0; transition: max-height .2s ease; }
    .nav-sub-section.open > .nav-items { max-height: 500px; }

    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px 7px 50px;
      cursor: pointer; font-size: 13px; color: var(--md-text-secondary);
      border-left: 3px solid transparent;
      transition: all .15s;
      border: none; border-left: 3px solid transparent;
      background: none; width: 100%; font-family: inherit; text-align: left;
    }
    .nav-item:hover { background: var(--md-accent-light); color: var(--md-primary); }
    .nav-item.active {
      background: var(--md-accent-light); color: var(--md-primary);
      border-left-color: var(--md-primary); font-weight: 600;
    }
    .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .5; flex-shrink: 0; }
    .nav-item.active .nav-dot { opacity: 1; }

    .nav-leaf {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px 8px 34px;
      cursor: pointer; font-size: 13px; color: var(--md-text-secondary);
      transition: all .15s;
      border: none; border-left: 3px solid transparent;
      background: none; width: 100%; font-family: inherit; text-align: left;
    }
    .nav-leaf:hover { background: var(--md-accent-light); color: var(--md-primary); }
    .nav-leaf.active {
      background: var(--md-accent-light); color: var(--md-primary);
      border-left-color: var(--md-primary); font-weight: 600;
    }
    .nav-divider { height: 1px; background: var(--md-divider); margin: 10px 14px; }

    /* ── Main ── */
    #main { flex: 1; overflow-y: auto; padding: 28px 32px; }
    #main::-webkit-scrollbar { width: 6px; }
    #main::-webkit-scrollbar-thumb { background: var(--md-border); border-radius: 3px; }

    /* ── T-06: Home View ── */
    .home-header { margin-bottom: 28px; }
    .home-header h1 { font-size: 24px; font-weight: 700; color: var(--md-primary-dark); margin-bottom: 6px; }
    .home-header p  { font-size: 14px; color: var(--md-text-secondary); }

    .home-category { margin-bottom: 32px; }
    .home-category-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; color: var(--md-primary);
      margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--md-accent-light);
    }
    .home-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }
    .home-card {
      background: var(--md-surface); border-radius: var(--r);
      padding: 18px; box-shadow: var(--el1);
      cursor: pointer; border: none;
      border-top: 3px solid var(--md-accent);
      transition: box-shadow .2s, transform .15s;
      text-align: left; font-family: inherit; width: 100%;
    }
    .home-card:hover { box-shadow: var(--el2); transform: translateY(-2px); }
    .home-card-icon  { font-size: 24px; margin-bottom: 10px; }
    .home-card-title { font-size: 13px; font-weight: 700; color: var(--md-text); margin-bottom: 5px; }
    .home-card-sub   { font-size: 11px; color: var(--md-text-disabled); }

    /* T-07: 検索結果ビュー */
    .search-results-label {
      font-size: 13px; color: var(--md-text-secondary); margin-bottom: 16px;
    }
    .search-results-label strong { color: var(--md-primary); }

    /* ── Detail View ── */
    #detail-view { max-width: 800px; }

    .breadcrumb {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--md-text-disabled);
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .bc-item { color: var(--md-text-secondary); }
    .bc-item.current { color: var(--md-primary); font-weight: 600; }
    .bc-sep { font-size: 9px; }

    .service-header {
      display: flex; align-items: flex-start; gap: 18px; margin-bottom: 24px;
    }
    .service-icon-lg {
      width: 54px; height: 54px; border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .service-header-text h1 {
      font-size: 24px; font-weight: 700; color: var(--md-primary-dark); margin-bottom: 6px;
    }
    .service-cat-badge {
      display: inline-flex; align-items: center;
      background: var(--md-accent-light); color: var(--md-primary);
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .service-desc {
      background: var(--md-surface); border-radius: var(--r);
      padding: 20px 24px; box-shadow: var(--el1); margin-bottom: 20px;
      font-size: 14px; line-height: 1.85; color: var(--md-text-secondary);
      border-left: 4px solid var(--md-primary);
    }
    .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px; margin-bottom: 20px;
    }
    .feature-card {
      background: var(--md-surface); border-radius: var(--r);
      padding: 18px; box-shadow: var(--el1);
      border-top: 3px solid var(--md-accent);
      transition: box-shadow .2s, transform .15s;
    }
    .feature-card:hover { box-shadow: var(--el2); transform: translateY(-2px); }
    .feature-icon  { font-size: 20px; margin-bottom: 8px; }
    .feature-title { font-size: 13px; font-weight: 700; color: var(--md-text); margin-bottom: 6px; }
    .feature-desc  { font-size: 12px; color: var(--md-text-secondary); line-height: 1.6; }

    .flow-section {
      background: var(--md-surface); border-radius: var(--r);
      padding: 20px 24px; box-shadow: var(--el1); margin-bottom: 20px;
    }
    .flow-section h3 {
      font-size: 14px; font-weight: 700; color: var(--md-primary);
      margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
    }
    .flow-steps { display: flex; align-items: stretch; }
    .flow-step { flex: 1; text-align: center; padding: 10px 6px; position: relative; }
    .flow-step:not(:last-child)::after {
      content: '→'; position: absolute; right: -8px; top: 50%;
      transform: translateY(-50%); color: var(--md-primary-light); font-size: 12px;
    }
    .step-num {
      width: 26px; height: 26px; background: var(--md-primary); color: #fff;
      border-radius: 50%; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 7px;
    }
    .step-label { font-size: 11px; font-weight: 500; color: var(--md-text); }

    .tag-list { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
    .tag-item {
      background: var(--md-surface); border: 1px solid var(--md-border);
      color: var(--md-text-secondary); padding: 4px 11px;
      border-radius: 20px; font-size: 11px; font-weight: 500;
    }
    .cta-bar {
      background: linear-gradient(135deg, var(--md-primary) 0%, var(--md-primary-light) 100%);
      border-radius: var(--r); padding: 22px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .cta-text h4 { color: #fff; font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .cta-text p  { color: rgba(255,255,255,.72); font-size: 12px; }
    .cta-btn {
      background: #fff; color: var(--md-primary);
      border: none; padding: 11px 22px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      box-shadow: var(--el1); transition: box-shadow .2s, transform .15s;
    }
    .cta-btn:hover { box-shadow: var(--el2); transform: translateY(-1px); }

    /* ── T-08: 問い合わせモーダル ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,20,50,.55); backdrop-filter: blur(3px);
      z-index: 500; align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: var(--md-surface); border-radius: var(--r);
      padding: 32px; width: min(520px, 90vw);
      box-shadow: var(--el3); position: relative;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--md-primary-dark); }
    .modal-close {
      background: none; border: none; font-size: 20px;
      color: var(--md-text-disabled); cursor: pointer; padding: 4px;
    }
    .modal-close:hover { color: var(--md-text); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--md-text-secondary); margin-bottom: 5px; }
    .form-label .req { color: #c62828; margin-left: 2px; }
    .form-input, .form-textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--md-border); border-radius: var(--r-sm);
      font-family: inherit; font-size: 13px; color: var(--md-text);
      background: var(--md-surface-v); transition: border-color .15s; outline: none;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--md-primary-light); background: #fff;
    }
    .form-textarea { resize: vertical; min-height: 90px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      background: none; border: 1px solid var(--md-border);
      color: var(--md-text-secondary); padding: 9px 18px;
      border-radius: var(--r-sm); font-family: inherit; font-size: 13px;
      cursor: pointer; transition: background .15s;
    }
    .btn-cancel:hover { background: var(--md-bg); }
    .btn-submit {
      background: var(--md-primary); color: #fff;
      border: none; padding: 9px 22px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .btn-submit:hover { background: var(--md-primary-light); }
  </style>
</head>
<body>

<header id="topbar" role="banner">
  <div class="logo">
    <div class="logo-icon" aria-hidden="true">🏛️</div>
    <span class="logo-text">PMOサービスメニュー</span>
    <span class="logo-sub">Project Management Office</span>
  </div>
  <div id="search-wrap" role="search">
    <span class="search-icon" aria-hidden="true">🔍</span>
    <input id="search-input" type="search" placeholder="サービスを検索…"
           aria-label="サービスを検索" autocomplete="off">
    <button id="search-clear" aria-label="検索をクリア" onclick="clearSearch()">✕</button>
  </div>
</header>

<div id="layout">
  <nav id="sidenav" aria-label="サービスナビゲーション">
    <button class="nav-home-btn active" id="nav-home-btn" onclick="showHome()" aria-current="page">
      🏠 すべてのサービス
    </button>

    <span class="nav-category-label">品質PMO</span>
    <div class="nav-section open" id="sec-quality">
      <button class="nav-section-header" onclick="toggleSection('sec-quality')" aria-expanded="true">
        <span class="section-icon" style="background:#e8edf8" aria-hidden="true">🛡️</span>
        <span class="section-label">品質PMO</span>
        <span class="chevron" aria-hidden="true">▶</span>
      </button>
      <div class="nav-sub-section open">
        <div class="nav-sub-section open" id="sub-hyoka">
          <button class="nav-sub-header" onclick="toggleSub('sub-hyoka')" aria-expanded="true">
            品質評価支援軸 <span class="sub-chevron" aria-hidden="true">▶</span>
          </button>
          <div class="nav-items">
            <div class="nav-sub-section open" id="sub-pro" style="max-height:800px">
              <button class="nav-sub-header" style="padding-left:50px" onclick="toggleSub('sub-pro')" aria-expanded="true">
                プロフェッショナル支援 <span class="sub-chevron" aria-hidden="true">▶</span>
              </button>
              <div class="nav-items" style="max-height:500px">
                <button class="nav-item" onclick="showService('consultant')" data-id="consultant"><span class="nav-dot"></span>コンサルタント派遣</button>
                <button class="nav-item" onclick="showService('planning')"   data-id="planning"  ><span class="nav-dot"></span>各種策定支援</button>
                <button class="nav-item" onclick="showService('impl')"       data-id="impl"       ><span class="nav-dot"></span>実装推進支援</button>
                <button class="nav-item" onclick="showService('advisor')"    data-id="advisor"    ><span class="nav-dot"></span>顧問型支援</button>
              </div>
            </div>
            <button class="nav-item" style="padding-left:50px" onclick="showService('education')" data-id="education"><span class="nav-dot"></span>教育・示唆</button>
          </div>
        </div>
        <button class="nav-leaf" onclick="showService('project')"   data-id="project"   ><span class="nav-dot"></span>プロジェクト推進</button>
        <button class="nav-leaf" onclick="showService('test-promo')" data-id="test-promo"><span class="nav-dot"></span>テスト推進</button>
      </div>
    </div>

    <div class="nav-divider" role="separator"></div>
    <span class="nav-category-label">AIサービス</span>
    <div class="nav-section open" id="sec-ai">
      <button class="nav-section-header" onclick="toggleSection('sec-ai')" aria-expanded="true">
        <span class="section-icon" style="background:#e8f5e9" aria-hidden="true">🤖</span>
        <span class="section-label">AIサービス</span>
        <span class="chevron" aria-hidden="true">▶</span>
      </button>
      <div class="nav-sub-section open">
        <div class="nav-sub-section open" id="sub-aitools">
          <button class="nav-sub-header" onclick="toggleSub('sub-aitools')" aria-expanded="true">
            AIツール <span class="sub-chevron" aria-hidden="true">▶</span>
          </button>
          <div class="nav-items">
            <button class="nav-item" onclick="showService('doc-verify')"  data-id="doc-verify" ><span class="nav-dot"></span>ドキュメント検証</button>
            <button class="nav-item" onclick="showService('trace')"        data-id="trace"       ><span class="nav-dot"></span>トレーサビリティ</button>
            <button class="nav-item" onclick="showService('plan-ai')"     data-id="plan-ai"    ><span class="nav-dot"></span>計画策定</button>
            <button class="nav-item" onclick="showService('test-design')" data-id="test-design"><span class="nav-dot"></span>テスト設計</button>
            <button class="nav-item" onclick="showService('uiux')"        data-id="uiux"       ><span class="nav-dot"></span>UI/UX検証</button>
          </div>
        </div>
        <div class="nav-sub-section open" id="sub-auto">
          <button class="nav-sub-header" onclick="toggleSub('sub-auto')" aria-expanded="true">
            自動化サービス <span class="sub-chevron" aria-hidden="true">▶</span>
          </button>
          <div class="nav-items">
            <button class="nav-item" onclick="showService('test-auto')" data-id="test-auto"><span class="nav-dot"></span>テスト自動化（UI・API・BAT）</button>
            <button class="nav-item" onclick="showService('cicd')"      data-id="cicd"     ><span class="nav-dot"></span>CI/CD構築</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main id="main" role="main">
    <!-- T-06: Home View -->
    <div id="home-view">
      <div class="home-header">
        <h1>PMOサービスメニュー</h1>

function init() {
  renderHomeCards();
  showHome();
  document.getElementById('search-input').addEventListener('input', onSearch);
}

function renderHomeCards() {
  const qEl = document.getElementById('home-cards-quality');
  const aEl = document.getElementById('home-cards-ai');
  Object.entries(SERVICES).forEach(([id, s]) => {
    const btn = document.createElement('button');
    btn.className = 'home-card';
    btn.setAttribute('aria-label', s.title);
    btn.innerHTML = `<div class="home-card-icon">${s.icon}</div><div class="home-card-title">${s.title}</div><div class="home-card-sub">${s.category}</div>`;
    btn.onclick = () => showService(id);
    (s.group === 'quality' ? qEl : aEl).appendChild(btn);
  });
}

function toggleSection(id) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('open');
  el.querySelector('.nav-section-header').setAttribute('aria-expanded', String(open));
}
function toggleSub(id) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('open');
  el.querySelector('.nav-sub-header').setAttribute('aria-expanded', String(open));
}

function showHome() {
  document.getElementById('home-view').style.display   = 'block';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'none';
  document.querySelectorAll('.nav-item,.nav-leaf').forEach(el => el.classList.remove('active'));
  const hb = document.getElementById('nav-home-btn');
  hb.classList.add('active');
  hb.setAttribute('aria-current','page');
}

function showService(id) {
  const s = SERVICES[id];
  if (!s) return;
  document.querySelectorAll('.nav-item,.nav-leaf').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector('[data-id="'+id+'"]');
  if (navEl) navEl.classList.add('active');
  const hb = document.getElementById('nav-home-btn');
  hb.classList.remove('active');
  hb.removeAttribute('aria-current');

  document.getElementById('home-view').style.display   = 'none';
  document.getElementById('search-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'block';

  const bc = s.breadcrumb.map((b,i) =>
    i === s.breadcrumb.length - 1
      ? `<span class="bc-item current" aria-current="page">${b}</span>`
      : `<span class="bc-item">${b}</span><span class="bc-sep" aria-hidden="true">›</span>`
  ).join('');

  const features = s.features.map(f =>
    `<div class="feature-card"><div class="feature-icon">${f.icon}</div><div class="feature-title">${f.title}</div><div class="feature-desc">${f.desc}</div></div>`
  ).join('');

  const steps = s.steps.map((st,i) =>
    `<div class="flow-step"><div class="step-num">${i+1}</div><div class="step-label">${st}</div></div>`
  ).join('');

  const tags = s.tags.map(t => `<span class="tag-item">${t}</span>`).join('');

  dv.innerHTML = `
    <nav class="breadcrumb" aria-label="パンくず">${bc}</nav>
    <div class="service-header">
      <div class="service-icon-lg" style="background:${s.iconBg}">${s.icon}</div>
      <div class="service-header-text">
        <h1>${s.title}</h1>
        <span class="service-cat-badge">${s.category}</span>
      </div>
    </div>
    <div class="service-desc">${s.desc}</div>
    <div class="cards-grid">${features}</div>
    <div class="flow-section">
      <h3>⚡ 支援フロー</h3>
      <div class="flow-steps">${steps}</div>
    </div>
    <div class="tag-list">${tags}</div>
    <div class="cta-bar">
      <div class="cta-text">
        <h4>まずはお気軽にご相談ください</h4>
        <p>サービス内容・費用・スケジュールについて詳しくご説明します</p>
      </div>
      <button class="cta-btn" onclick="openModal('${s.title.replace(/'/g,"\\'")}')">
        ${s.cta}
      </button>
    </div>`;
}

function onSearch(e) {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { clearSearch(); return; }
  const results = Object.entries(SERVICES).filter(([,s]) =>
    s.title.toLowerCase().includes(q) ||
    s.category.toLowerCase().includes(q) ||
    s.tags.some(t => t.toLowerCase().includes(q))
  );
  document.getElementById('home-view').style.display   = 'none';
  document.getElementById('detail-view').style.display = 'none';
  const sv = document.getElementById('search-view');
  sv.style.display = 'block';
  document.getElementById('search-results-label').innerHTML =
    `「<strong>${e.target.value}</strong>」の検索結果：${results.length}件`;
  const cards = document.getElementById('search-results-cards');
  cards.innerHTML = '';
  results.forEach(([id, s]) => {
    const btn = document.createElement('button');
    btn.className = 'home-card';
    btn.innerHTML = `<div class="home-card-icon">${s.icon}</div><div class="home-card-title">${s.title}</div><div class="home-card-sub">${s.category}</div>`;
    btn.onclick = () => { clearSearch(); showService(id); };
    cards.appendChild(btn);
  });
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-view').style.display = 'none';
  showHome();
}

function openModal(serviceName) {
  document.getElementById('f-service').value = serviceName || '';
  ['f-company','f-name','f-email','f-body'].forEach(id => document.getElementById(id).value = '');
  const ov = document.getElementById('modal-overlay');
  ov.classList.add('open');
  document.getElementById('f-company').focus();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function submitForm() {
  const company = document.getElementById('f-company').value.trim();
  const name    = document.getElementById('f-name').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  if (!company || !name || !email) {
    alert('会社名・お名前・メールアドレスは必須項目です。');
    return;
  }
  closeModal();
  alert(name + ' 様\n\nお問い合わせを受け付けました。\n担当者より ' + email + ' 宛にご連絡いたします。');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
init();
</script>
</body>
</html>
