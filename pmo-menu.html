<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMOメニュー</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --md-primary:       #1a3a6b;
      --md-primary-light: #2e5aa8;
      --md-primary-dark:  #0d2240;
      --md-bg:            #f0f2f7;
      --md-surface:       #ffffff;
      --md-surface-v:     #f7f8fc;
      --md-border:        #dde2ee;
      --md-divider:       #eaedf5;
      --md-text:          #1a1f2e;
      --md-text-secondary:#4a5568;
      --md-text-disabled: #a0aec0;
      --md-accent:        #2e5aa8;
      --md-accent-light:  #e8edf8;
      --color-critical:   #c62828;
      --color-success:    #2e7d32;
      --nav-w:            260px;
      --top-h:            60px;
      --r:                10px;
      --r-sm:             6px;
      --el1: 0 1px 3px rgba(26,58,107,.08), 0 1px 2px rgba(26,58,107,.12);
      --el2: 0 3px 8px rgba(26,58,107,.10), 0 2px 4px rgba(26,58,107,.08);
      --el3: 0 8px 24px rgba(26,58,107,.12), 0 4px 8px rgba(26,58,107,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--md-bg);
      color: var(--md-text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Topbar ── */
    #topbar {
      height: var(--top-h);
      background: var(--md-primary);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: var(--el2);
      z-index: 100;
    }
    #topbar .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #topbar .logo-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.15);
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    #topbar .logo-text {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #topbar .logo-sub {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: 400;
      margin-left: 4px;
    }
    #topbar .spacer { flex: 1; }
    #topbar .tag {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Layout ── */
    #layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidenav {
      width: var(--nav-w);
      background: var(--md-surface);
      border-right: 1px solid var(--md-border);
      overflow-y: auto;
      flex-shrink: 0;
      padding-bottom: 24px;
    }
    #sidenav::-webkit-scrollbar { width: 4px; }
    #sidenav::-webkit-scrollbar-track { background: transparent; }
    #sidenav::-webkit-scrollbar-thumb { background: var(--md-border); border-radius: 2px; }

    .nav-category {
      padding: 20px 16px 8px;
    }
    .nav-category-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--md-text-disabled);
    }

    .nav-section {
      margin: 4px 0;
    }
    .nav-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 10px 20px;
      cursor: pointer;
      user-select: none;
      border-radius: 0;
      transition: background 0.15s;
    }
    .nav-section-header:hover { background: var(--md-bg); }
    .nav-section-header .section-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .nav-section-header .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--md-text);
      flex: 1;
    }
    .nav-section-header .chevron {
      font-size: 10px;
      color: var(--md-text-disabled);
      transition: transform 0.2s;
    }
    .nav-section.open .chevron { transform: rotate(90deg); }

    .nav-sub-section {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }
    .nav-section.open .nav-sub-section { max-height: 600px; }

    .nav-sub-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px 7px 36px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--md-text-secondary);
      transition: background 0.15s;
    }
    .nav-sub-header:hover { background: var(--md-bg); }
    .nav-sub-header .sub-chevron {
      font-size: 9px;
      color: var(--md-text-disabled);
      transition: transform 0.2s;
      margin-left: auto;
    }
    .nav-sub-section.open .nav-sub-header .sub-chevron { transform: rotate(90deg); }

    .nav-items {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.2s ease;
    }
    .nav-sub-section.open .nav-items { max-height: 400px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 8px 52px;
      cursor: pointer;
      font-size: 13px;
      color: var(--md-text-secondary);
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .nav-item:hover {
      background: var(--md-accent-light);
      color: var(--md-primary);
    }
    .nav-item.active {
      background: var(--md-accent-light);
      color: var(--md-primary);
      border-left-color: var(--md-primary);
      font-weight: 600;
    }
    .nav-item .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .nav-item.active .dot { opacity: 1; }

    /* Direct leaf items in nav-section (プロジェクト推進, テスト推進) */
    .nav-leaf {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px 9px 36px;
      cursor: pointer;
      font-size: 13px;
      color: var(--md-text-secondary);
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .nav-leaf:hover {
      background: var(--md-accent-light);
      color: var(--md-primary);
    }
    .nav-leaf.active {
      background: var(--md-accent-light);
      color: var(--md-primary);
      border-left-color: var(--md-primary);
      font-weight: 600;
    }
    .nav-leaf .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .nav-leaf.active .dot { opacity: 1; }

    .nav-divider {
      height: 1px;
      background: var(--md-divider);
      margin: 12px 16px;
    }

    /* ── Main content ── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }
    #main::-webkit-scrollbar { width: 6px; }
    #main::-webkit-scrollbar-track { background: transparent; }
    #main::-webkit-scrollbar-thumb { background: var(--md-border); border-radius: 3px; }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 16px;
      color: var(--md-text-secondary);
    }
    .welcome-icon {
      font-size: 56px;
      opacity: 0.3;
    }
    .welcome h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--md-text);
      opacity: 0.6;
    }
    .welcome p { font-size: 14px; opacity: 0.7; }

    /* Service page */
    .service-page { max-width: 820px; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--md-text-disabled);
      margin-bottom: 24px;
    }
    .breadcrumb span { color: var(--md-text-secondary); }
    .breadcrumb .sep { font-size: 10px; }
    .breadcrumb .current { color: var(--md-primary); font-weight: 500; }

    .service-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
    }
    .service-icon-large {
      width: 56px;
      height: 56px;
      border-radius: var(--r);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .service-header-text h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--md-primary-dark);
      margin-bottom: 6px;
    }
    .service-header-text .service-category {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--md-accent-light);
      color: var(--md-primary);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .service-desc {
      background: var(--md-surface);
      border-radius: var(--r);
      padding: 24px 28px;
      box-shadow: var(--el1);
      margin-bottom: 24px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--md-text-secondary);
      border-left: 4px solid var(--md-primary);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .feature-card {
      background: var(--md-surface);
      border-radius: var(--r);
      padding: 20px;
      box-shadow: var(--el1);
      transition: box-shadow 0.2s, transform 0.2s;
      border-top: 3px solid var(--md-accent);
    }
    .feature-card:hover {
      box-shadow: var(--el2);
      transform: translateY(-2px);
    }
    .feature-card .card-icon { font-size: 22px; margin-bottom: 10px; }
    .feature-card .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--md-text);
      margin-bottom: 8px;
    }
    .feature-card .card-desc {
      font-size: 12px;
      color: var(--md-text-secondary);
      line-height: 1.6;
    }

    .flow-section {
      background: var(--md-surface);
      border-radius: var(--r);
      padding: 24px 28px;
      box-shadow: var(--el1);
      margin-bottom: 24px;
    }
    .flow-section h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--md-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .flow-steps {
      display: flex;
      gap: 0;
      align-items: stretch;
    }
    .flow-step {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      position: relative;
    }
    .flow-step:not(:last-child)::after {
      content: '→';
      position: absolute;
      right: -8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--md-primary-light);
      font-size: 14px;
    }
    .flow-step .step-num {
      width: 28px;
      height: 28px;
      background: var(--md-primary);
      color: #fff;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
    }
    .flow-step .step-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--md-text);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tag-item {
      background: var(--md-surface);
      border: 1px solid var(--md-border);
      color: var(--md-text-secondary);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .cta-bar {
      background: linear-gradient(135deg, var(--md-primary) 0%, var(--md-primary-light) 100%);
      border-radius: var(--r);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .cta-bar .cta-text h4 {
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .cta-bar .cta-text p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
    }
    .cta-btn {
      background: #fff;
      color: var(--md-primary);
      border: none;
      padding: 12px 24px;
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: box-shadow 0.2s, transform 0.15s;
      box-shadow: var(--el1);
    }
    .cta-btn:hover {
      box-shadow: var(--el2);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <div class="logo">
    <div class="logo-icon">🏛️</div>
    <span class="logo-text">PMOメニュー</span>
    <span class="logo-sub">Project Management Office</span>
  </div>
  <div class="spacer"></div>
  <span class="tag">品質 &amp; AI</span>
</div>

<!-- Layout -->
<div id="layout">

  <!-- Sidenav -->
  <nav id="sidenav">

    <!-- 品質PMO -->
    <div class="nav-category">
      <span class="nav-category-label">サービスメニュー</span>
    </div>

    <div class="nav-section open" id="sec-quality">
      <div class="nav-section-header" onclick="toggleSection('sec-quality')">
        <div class="section-icon" style="background:#e8edf8;">🛡️</div>
        <span class="section-label">品質PMO</span>
        <span class="chevron">▶</span>
      </div>
      <div class="nav-sub-section open" id="sub-hyoka">
        <div class="nav-sub-header" onclick="toggleSub('sub-hyoka')">
          <span>品質評価支援軸</span>
          <span class="sub-chevron">▶</span>
        </div>
        <div class="nav-items">
          <!-- プロフェッショナル支援 -->
          <div class="nav-sub-section open" id="sub-pro" style="max-height:600px; overflow:visible;">
            <div class="nav-sub-header" style="padding-left:52px;" onclick="toggleSub('sub-pro')">
              <span>プロフェッショナル支援</span>
              <span class="sub-chevron">▶</span>
            </div>
            <div class="nav-items" style="max-height:600px;">
              <div class="nav-item" onclick="showService('consultant')" data-id="consultant"><span class="dot"></span>コンサルタント派遣</div>
              <div class="nav-item" onclick="showService('planning')" data-id="planning"><span class="dot"></span>各種策定支援</div>
              <div class="nav-item" onclick="showService('impl')" data-id="impl"><span class="dot"></span>実装推進支援</div>
              <div class="nav-item" onclick="showService('advisor')" data-id="advisor"><span class="dot"></span>顧問型支援</div>
            </div>
          </div>
          <div class="nav-item" style="padding-left:52px;" onclick="showService('education')" data-id="education"><span class="dot"></span>教育・示唆</div>
        </div>
      </div>
      <div class="nav-leaf" onclick="showService('project')" data-id="project"><span class="dot"></span>プロジェクト推進</div>
      <div class="nav-leaf" onclick="showService('test-promo')" data-id="test-promo"><span class="dot"></span>テスト推進</div>
    </div>

    <div class="nav-divider"></div>

    <!-- AIサービス -->
    <div class="nav-section open" id="sec-ai">
      <div class="nav-section-header" onclick="toggleSection('sec-ai')">
        <div class="section-icon" style="background:#e8f5e9;">🤖</div>
        <span class="section-label">AIサービス</span>
        <span class="chevron">▶</span>
      </div>
      <div class="nav-sub-section open" id="sub-aitools">
        <div class="nav-sub-header" onclick="toggleSub('sub-aitools')">
          <span>AIツール</span>
          <span class="sub-chevron">▶</span>
        </div>
        <div class="nav-items">
          <div class="nav-item" onclick="showService('doc-verify')" data-id="doc-verify"><span class="dot"></span>ドキュメント検証</div>
          <div class="nav-item" onclick="showService('trace')" data-id="trace"><span class="dot"></span>トレーサビリティ</div>
          <div class="nav-item" onclick="showService('plan-ai')" data-id="plan-ai"><span class="dot"></span>計画策定</div>
          <div class="nav-item" onclick="showService('test-design')" data-id="test-design"><span class="dot"></span>テスト設計</div>
          <div class="nav-item" onclick="showService('uiux')" data-id="uiux"><span class="dot"></span>UI/UX検証</div>
        </div>
      </div>
      <div class="nav-sub-section open" id="sub-auto">
        <div class="nav-sub-header" onclick="toggleSub('sub-auto')">
          <span>自動化サービス</span>
          <span class="sub-chevron">▶</span>
        </div>
        <div class="nav-items">
          <div class="nav-item" onclick="showService('test-auto')" data-id="test-auto"><span class="dot"></span>テスト自動化（UI、API、BAT）</div>
          <div class="nav-item" onclick="showService('cicd')" data-id="cicd"><span class="dot"></span>CI/CD構築</div>
        </div>
      </div>
    </div>

  </nav>

  <!-- Main -->
  <main id="main">
    <div class="welcome" id="welcome-state">
      <div class="welcome-icon">🏛️</div>
      <h2>PMOサービスメニュー</h2>
      <p>左のメニューからサービスを選択してください</p>
    </div>
    <div class="service-page" id="service-state" style="display:none;"></div>
  </main>

</div>

    impl: {
      icon: '⚡',
      iconBg: '#e8edf8',
      title: '実装推進支援',
      category: '品質PMO › プロフェッショナル支援',
      breadcrumb: ['品質PMO', '品質評価支援軸', 'プロフェッショナル支援', '実装推進支援'],

  function toggleSection(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
  }

  function toggleSub(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
  }

  function showService(id) {
    // Update active state
    document.querySelectorAll('.nav-item, .nav-leaf').forEach(el => el.classList.remove('active'));
    const target = document.querySelector(`[data-id="${id}"]`);
    if (target) target.classList.add('active');

    const s = SERVICES[id];
    if (!s) return;

    document.getElementById('welcome-state').style.display = 'none';
    const sp = document.getElementById('service-state');
    sp.style.display = 'block';

    const breadcrumbHtml = s.breadcrumb.map((b, i) =>
      i === s.breadcrumb.length - 1
        ? `<span class="current">${b}</span>`
        : `<span>${b}</span><span class="sep">›</span>`
    ).join('');

    const featuresHtml = s.features.map(f => `
      <div class="feature-card">
        <div class="card-icon">${f.icon}</div>
        <div class="card-title">${f.title}</div>
        <div class="card-desc">${f.desc}</div>
      </div>
    `).join('');

    const stepsHtml = s.steps.map((step, i) => `
      <div class="flow-step">
        <div class="step-num">${i + 1}</div>
        <div class="step-label">${step}</div>
      </div>
    `).join('');

    const tagsHtml = s.tags.map(t => `<span class="tag-item">${t}</span>`).join('');

    sp.innerHTML = `
      <div class="breadcrumb">${breadcrumbHtml}</div>
      <div class="service-header">
        <div class="service-icon-large" style="background:${s.iconBg};">${s.icon}</div>
        <div class="service-header-text">
          <h1>${s.title}</h1>
          <span class="service-category">${s.category}</span>
        </div>
      </div>
      <div class="service-desc">${s.desc}</div>
      <div class="cards-grid">${featuresHtml}</div>
      <div class="flow-section">
        <h3>⚡ 支援フロー</h3>
        <div class="flow-steps">${stepsHtml}</div>
      </div>
      <div class="tag-list">${tagsHtml}</div>
      <div class="cta-bar">
        <div class="cta-text">
          <h4>まずはお気軽にご相談ください</h4>
          <p>サービス内容・費用・スケジュールについて詳しくご説明します</p>
        </div>
        <button class="cta-btn" onclick="alert('お問い合わせありがとうございます。\\n担当者よりご連絡いたします。')">${s.cta}</button>
      </div>
    `;
  }

  // Open all sub-sections by default
  document.querySelectorAll('.nav-sub-section').forEach(el => el.classList.add('open'));
</script>
