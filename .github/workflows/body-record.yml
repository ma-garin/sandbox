# body-record PWA: 型チェック・単体テスト・E2E・GitHub Pages デプロイ
name: body-record CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'body-record/**'
      - '.github/workflows/body-record.yml'
  pull_request:
    paths:
      - 'body-record/**'
      - '.github/workflows/body-record.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: body-record

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: body-record/package-lock.json
      - run: npm ci
      - name: 型チェック & ビルド
        run: npm run build
      - name: 単体テスト (Vitest)
        run: npm test
      - name: Playwright ブラウザ導入
        run: npx playwright install --with-deps chromium
      - name: E2E (Playwright)
        run: npm run e2e

  deploy:
    # main への push 時のみ Pages へ公開
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: body-record/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: body-record/dist
      - id: deployment
        uses: actions/deploy-pages@v4
