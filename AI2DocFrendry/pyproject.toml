# AI2DocFrendry — 静的解析・テスト設定
# 依存の版は requirements.txt / requirements-dev.txt で管理する（本ファイルでは宣言しない）。

# =====================================================================
# ruff — lint / import順 / 命名 / セキュリティ
# =====================================================================
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]
include = ["src/**/*.py", "tests/**/*.py"]
extend-exclude = ["**/__pycache__", "build", "dist", ".venv", "venv"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort（import順）
    "N",    # pep8-naming（命名）
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "S",    # flake8-bandit（bandit相当）
    "ANN",  # flake8-annotations（型注釈）
    "C90",  # mccabe（NFR-14 複雑度の機械検査）
    "PL",   # pylint（関数長・引数数の機械検査に使用）
]
ignore = [
    "ANN401",  # typing.Any を明示的に使う箇所は許容
]

# NFR-14「1ファイル400行以内、関数50行以内、純粋関数」の機械検査。
# 行数そのものを直接測るルールは ruff に無いため、複雑度と文数で近似する。
# 厳密な行数検査は CI（W-24）側のスクリプトで補完すること。→ 要確認
[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-statements = 40     # 関数50行以内の近似（NFR-14）
max-args = 6
max-branches = 12
max-returns = 6

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.ruff.lint.per-file-ignores]
# テストでは assert（S101）と型注釈の一部を許容する
"tests/**/*.py" = ["S101", "ANN201", "ANN001", "PLR2004"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# =====================================================================
# mypy — strict 寄り
# =====================================================================
[tool.mypy]
files = ["src"]
python_version = "3.11"
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_optional = true
strict_equality = true
strict_optional = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
show_error_codes = true
pretty = true

# 型スタブを提供しないサードパーティは個別に無視する。
# 要確認: 各ライブラリのスタブ提供状況（types-* パッケージの有無）は未調査。
[[tool.mypy.overrides]]
module = [
    "pdfplumber.*",
    "pptx.*",
    "docx.*",
    "streamlit.*",
    "markdown_it.*",
]
ignore_missing_imports = true

# =====================================================================
# pytest / カバレッジ（NFR-15: 80%以上、diagnosis / verify は必須）
# =====================================================================
[tool.pytest.ini_options]
minversion = "9.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--strict-markers",
    "--strict-config",
    "-ra",
]
markers = [
    "slow: 実行に時間がかかるテスト（総合テスト相当）",
    "integration: 結合テスト",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = ["*/__pycache__/*", "*/tests/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
# NFR-15: 全体80%以上。診断・検証モジュールはより高い水準を別途要求する。→ 要確認（閾値未確定）
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

# =====================================================================
# bandit（ruff の S ルールと重複するが、CI では独立実行する想定）
# =====================================================================
[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", "__pycache__"]
