# diet-support PWA を GitHub Pages に公開する
# 有効化: リポジトリ Settings → Pages → Source を「GitHub Actions」に設定
# diet-support/ 配下をサイトのルートとして公開する（公開 URL は https://<user>.github.io/<repo>/）
name: Deploy diet-support to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'diet-support/**'
      - '.github/workflows/deploy-diet-support.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./diet-support
      - id: deployment
        uses: actions/deploy-pages@v4
