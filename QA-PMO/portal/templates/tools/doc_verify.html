{% extends "tools/_layout.html" %}
{% block tool %}
<p class="tool-desc">要件定義書・設計書などを貼り付け、または<strong>PDFをアップロード</strong>して検証します。日本語の文章校正は実績OSS <code>textlint</code>（未導入時は内蔵ルール）、必須節欠落・種別固有ルールは内蔵判定で指摘します。</p>
<form method="post" enctype="multipart/form-data"
      hx-post="." hx-target="#tool-result" hx-swap="innerHTML"
      hx-encoding="multipart/form-data" hx-indicator="#dv-spin">
  {% csrf_token %}
  <div class="form-row" style="margin-bottom:10px;gap:14px;flex-wrap:wrap">
    <label class="lbl" style="flex:0 0 auto">ドキュメント種別
      <select name="doc_type" class="inp">
        <option value="general" {% if doc_type == 'general' %}selected{% endif %}>汎用（共通ルール）</option>
        <option value="requirements" {% if doc_type == 'requirements' %}selected{% endif %}>要件定義書</option>
        <option value="test-design" {% if doc_type == 'test-design' %}selected{% endif %}>テスト設計書</option>
        <option value="api-spec" {% if doc_type == 'api-spec' %}selected{% endif %}>API仕様書</option>
      </select>
    </label>
    <label class="lbl" style="flex:0 0 auto">PDFから読み込む（任意）
      <input type="file" name="pdf" accept="application/pdf" class="inp">
    </label>
  </div>
  <textarea name="text" class="tool-ta" placeholder="ここにドキュメント本文を貼り付け…">{{ text }}</textarea>
  <div class="tool-actions">
    <button class="btn-primary" type="submit">検証する</button>
    <span id="dv-spin" class="htmx-indicator spin">検証中…</span>
  </div>
</form>

<div id="tool-result">
  {% include "tools/_partials/doc_verify_result.html" %}
</div>
{% endblock %}
