<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1976D2">
<title>Diet Support — 体重管理</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============ Design tokens (Yuki Design System / MD3 Light) ============ */
:root{
  --color-primary:#1976D2; --color-primary-light:#E3F2FD; --color-primary-dark:#0D47A1;
  --color-bg:#F8F9FA; --color-surface:#FFFFFF; --color-surface-2:#F1F3F4;
  --color-border:#E0E0E0; --color-divider:#F0F0F0;
  --color-text:#212121; --color-text-secondary:#616161; --color-text-disabled:#9E9E9E;
  --color-up:#D32F2F;    /* 増加（体重が増えた） */
  --color-down:#388E3C;  /* 減少（目標方向） */
  --color-goal:#F57C00;  /* 目標ライン */
  --color-info:#0288D1;
  --font-main:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
  --text-xs:11px; --text-sm:13px; --text-base:14px; --text-md:16px; --text-lg:18px; --text-xl:22px; --text-2xl:30px;
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-6:24px; --space-8:32px;
  --radius-sm:4px; --radius-md:8px; --radius-lg:12px; --radius-full:9999px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08); --shadow-md:0 2px 8px rgba(0,0,0,.12); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
  --nav-h:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-main); background:var(--color-bg); color:var(--color-text);
  font-size:var(--text-base); line-height:1.6;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
/* ============ App bar ============ */
.appbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; gap:var(--space-2);
  padding:var(--space-3) var(--space-4);
  padding-top:calc(var(--space-3) + env(safe-area-inset-top));
  background:var(--color-primary); color:#fff; box-shadow:var(--shadow-sm);
}
.appbar .logo-ico{font-size:22px}
.appbar h1{font-size:var(--text-lg); font-weight:700; margin:0; flex:1}
.appbar .sub{font-size:var(--text-xs); opacity:.85; font-weight:400}

/* ============ Layout ============ */
main{max-width:640px; margin:0 auto; padding:var(--space-4)}
.view{display:none; animation:fade .18s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h2.view-title{font-size:var(--text-xl); margin:0 0 var(--space-4)}

.card{
  background:var(--color-surface); border:1px solid var(--color-border);
  border-radius:var(--radius-lg); padding:var(--space-6); box-shadow:var(--shadow-sm);
  margin-bottom:var(--space-4);
}
.card-title{font-size:var(--text-sm); color:var(--color-text-secondary); font-weight:500; margin:0 0 var(--space-3)}

/* ============ Dashboard hero ============ */
.hero{text-align:center; padding:var(--space-6) var(--space-4)}
.hero .big{font-size:52px; font-weight:700; line-height:1.05; letter-spacing:-1px}
.hero .big .unit{font-size:var(--text-xl); font-weight:500; color:var(--color-text-secondary); margin-left:var(--space-1)}
.hero .date{font-size:var(--text-sm); color:var(--color-text-secondary); margin-top:var(--space-1)}
.delta-row{display:flex; justify-content:center; gap:var(--space-3); margin-top:var(--space-4); flex-wrap:wrap}
.delta{
  display:inline-flex; flex-direction:column; align-items:center;
  background:var(--color-surface-2); border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-4); min-width:88px;
}
.delta .lbl{font-size:var(--text-xs); color:var(--color-text-secondary)}
.delta .val{font-size:var(--text-md); font-weight:700; margin-top:2px}
.up{color:var(--color-up)} .down{color:var(--color-down)} .flat{color:var(--color-text-secondary)}

/* stats grid */
.stat-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:var(--space-3)}
.stat{background:var(--color-surface-2); border-radius:var(--radius-md); padding:var(--space-4); text-align:center}
.stat .v{font-size:var(--text-xl); font-weight:700}
.stat .l{font-size:var(--text-xs); color:var(--color-text-secondary); margin-top:2px}

/* progress */
.progress-wrap{margin-top:var(--space-2)}
.progress-meta{display:flex; justify-content:space-between; font-size:var(--text-xs); color:var(--color-text-secondary); margin-bottom:var(--space-2)}
.progress-bar{height:12px; background:var(--color-surface-2); border-radius:var(--radius-full); overflow:hidden}
.progress-fill{height:100%; background:linear-gradient(90deg,var(--color-primary),var(--color-info)); border-radius:var(--radius-full); transition:width .4s ease}
.progress-num{text-align:center; font-size:var(--text-2xl); font-weight:700; margin:var(--space-2) 0}
.progress-num small{font-size:var(--text-md); color:var(--color-text-secondary); font-weight:500}

/* ============ Forms ============ */
label.field{display:block; margin-bottom:var(--space-4)}
label.field .lbl{display:block; font-size:var(--text-sm); color:var(--color-text-secondary); margin-bottom:var(--space-2); font-weight:500}
input,select,textarea,button{font-family:inherit; font-size:var(--text-md)}
input[type=date],input[type=number],input[type=text],select,textarea{
  width:100%; padding:var(--space-3); border:1px solid var(--color-border);
  border-radius:var(--radius-md); background:var(--color-surface); color:var(--color-text);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--color-primary); border-color:var(--color-primary)}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3)}
textarea{resize:vertical; min-height:60px}

button{cursor:pointer; border:none; border-radius:var(--radius-md); min-height:48px; font-weight:700; transition:filter .15s}
button:active{filter:brightness(.94)}
.btn-primary{background:var(--color-primary); color:#fff; width:100%; padding:var(--space-3)}
.btn-outline{background:var(--color-surface); color:var(--color-primary); border:1px solid var(--color-primary); padding:var(--space-3)}
.btn-danger{background:var(--color-surface); color:var(--color-up); border:1px solid var(--color-up)}
.btn-ghost{background:var(--color-surface-2); color:var(--color-text); padding:var(--space-2) var(--space-3); min-height:40px; font-weight:500}
.btn-row{display:flex; gap:var(--space-3)}
.btn-row>*{flex:1}

/* stepper for weight input */
.stepper{display:flex; align-items:stretch; gap:var(--space-2)}
.stepper input{text-align:center; font-size:var(--text-2xl); font-weight:700; -moz-appearance:textfield}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stepper button{width:56px; background:var(--color-primary-light); color:var(--color-primary); font-size:26px; flex:none}

/* ============ Chart ============ */
.range-tabs{display:flex; gap:var(--space-2); margin-bottom:var(--space-4); overflow-x:auto}
.range-tabs button{
  flex:none; min-height:36px; padding:var(--space-1) var(--space-4);
  border-radius:var(--radius-full); background:var(--color-surface-2); color:var(--color-text-secondary); font-weight:500;
}
.range-tabs button.active{background:var(--color-primary); color:#fff}
.chart-box{position:relative; width:100%}
svg.chart{width:100%; height:auto; display:block; touch-action:pan-y}
.legend{display:flex; gap:var(--space-4); justify-content:center; margin-top:var(--space-3); font-size:var(--text-xs); color:var(--color-text-secondary); flex-wrap:wrap}
.legend span{display:inline-flex; align-items:center; gap:6px}
.legend i{width:16px; height:3px; border-radius:2px; display:inline-block}

/* ============ History list ============ */
.rec{display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3) var(--space-2); border-bottom:1px solid var(--color-divider)}
.rec:last-child{border-bottom:none}
.rec .r-date{font-size:var(--text-sm); color:var(--color-text-secondary); width:88px; flex:none}
.rec .r-w{font-size:var(--text-md); font-weight:700; width:76px; flex:none}
.rec .r-w small{font-size:var(--text-xs); color:var(--color-text-secondary); font-weight:400}
.rec .r-d{font-size:var(--text-sm); font-weight:700; width:60px; flex:none; text-align:right}
.rec .r-memo{flex:1; font-size:var(--text-xs); color:var(--color-text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.rec .r-edit{flex:none; background:none; color:var(--color-text-disabled); min-height:36px; min-width:36px; padding:0; font-size:18px}

/* ============ Bottom nav ============ */
nav.bottom{
  position:fixed; left:0; right:0; bottom:0; z-index:30;
  display:flex; background:var(--color-surface); border-top:1px solid var(--color-border);
  padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -1px 6px rgba(0,0,0,.05);
}
nav.bottom button{
  flex:1; background:none; color:var(--color-text-disabled); font-weight:500;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  height:var(--nav-h); font-size:var(--text-xs); min-width:0;
}
nav.bottom button .ico{font-size:22px; line-height:1}
nav.bottom button.active{color:var(--color-primary)}

/* ============ FAB ============ */
.fab{
  position:fixed; right:var(--space-4); bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + var(--space-4));
  z-index:25; width:56px; height:56px; border-radius:var(--radius-full);
  background:var(--color-primary); color:#fff; font-size:28px; box-shadow:var(--shadow-lg);
  display:flex; align-items:center; justify-content:center;
}

/* ============ Toast / empty / misc ============ */
.toast{
  position:fixed; left:50%; bottom:calc(var(--nav-h) + 24px); transform:translateX(-50%) translateY(20px);
  background:#323232; color:#fff; padding:var(--space-3) var(--space-6); border-radius:var(--radius-full);
  font-size:var(--text-sm); z-index:50; opacity:0; pointer-events:none; transition:.25s; box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.empty{text-align:center; color:var(--color-text-disabled); padding:var(--space-8) var(--space-4)}
.empty .e-ico{font-size:48px; opacity:.5}
.hr{height:1px; background:var(--color-divider); margin:var(--space-4) 0; border:none}
.hint{font-size:var(--text-xs); color:var(--color-text-secondary); margin-top:var(--space-2); line-height:1.5}
.badge{display:inline-flex; align-items:center; padding:2px 10px; border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:600}
.badge-info{background:var(--color-primary-light); color:var(--color-primary)}
.settings-group{font-size:var(--text-sm); font-weight:700; color:var(--color-text-secondary); margin:var(--space-6) 0 var(--space-2)}
a.link{color:var(--color-primary)}

@media(max-width:360px){
  .hero .big{font-size:44px}
  .stat-grid{grid-template-columns:1fr}
  .field-row{grid-template-columns:1fr}
  .rec .r-memo{display:none}
}
</style>
</head>
<body>

<header class="appbar">
  <span class="logo-ico">🏃</span>
  <h1>Diet Support<span class="sub"> ／ 体重管理</span></h1>
</header>

<main>
  <!-- ============ ホーム ============ -->
  <section id="view-home" class="view active">
    <div id="home-body"><!-- rendered --></div>
  </section>

  <!-- ============ 記録 ============ -->
  <section id="view-record" class="view">
    <h2 class="view-title">記録する</h2>
    <div class="card">
      <label class="field">
        <span class="lbl">日付</span>
        <input type="date" id="in-date">
      </label>
      <label class="field">
        <span class="lbl">体重 (kg)</span>
        <div class="stepper">
          <button type="button" id="w-minus" aria-label="0.1減らす">−</button>
          <input type="number" id="in-weight" inputmode="decimal" step="0.1" placeholder="65.0">
          <button type="button" id="w-plus" aria-label="0.1増やす">＋</button>
        </div>
      </label>
      <div class="field-row">
        <label class="field">
          <span class="lbl">体脂肪率 (%) <small style="font-weight:400">任意</small></span>
          <input type="number" id="in-fat" inputmode="decimal" step="0.1" placeholder="18.0">
        </label>
        <label class="field">
          <span class="lbl">BMI</span>
          <input type="text" id="in-bmi" readonly placeholder="—" style="background:var(--color-surface-2)">
        </label>
      </div>
      <label class="field">
        <span class="lbl">メモ <small style="font-weight:400">任意</small></span>
        <textarea id="in-memo" placeholder="食事・運動・体調など"></textarea>
      </label>
      <button class="btn-primary" id="btn-save">保存</button>
      <button class="btn-danger" id="btn-delete-rec" style="width:100%;margin-top:var(--space-3);display:none">この日の記録を削除</button>
      <p class="hint" id="save-hint"></p>
    </div>
  </section>

  <!-- ============ グラフ ============ -->
  <section id="view-chart" class="view">
    <h2 class="view-title">推移グラフ</h2>
    <div class="range-tabs" id="range-tabs">
      <button data-range="14">2週</button>
      <button data-range="30" class="active">1ヶ月</button>
      <button data-range="90">3ヶ月</button>
      <button data-range="180">6ヶ月</button>
      <button data-range="0">全期間</button>
    </div>
    <div class="card">
      <div class="chart-box" id="chart-box"><!-- svg --></div>
      <div class="legend">
        <span><i style="background:var(--color-primary)"></i>体重</span>
        <span><i style="background:var(--color-info);opacity:.7"></i>7日移動平均</span>
        <span><i style="background:var(--color-goal)"></i>目標</span>
      </div>
    </div>
    <div class="card" id="chart-fat-card" style="display:none">
      <p class="card-title">体脂肪率 (%)</p>
      <div class="chart-box" id="chart-fat-box"></div>
    </div>
  </section>

  <!-- ============ 履歴 ============ -->
  <section id="view-history" class="view">
    <h2 class="view-title">履歴 <span class="badge badge-info" id="hist-count">0件</span></h2>
    <div class="card" style="padding:var(--space-3) var(--space-4)">
      <div id="hist-list"><!-- rendered --></div>
    </div>
  </section>

  <!-- ============ 設定 ============ -->
  <section id="view-settings" class="view">
    <h2 class="view-title">設定</h2>

    <div class="settings-group">プロフィール・目標</div>
    <div class="card">
      <label class="field">
        <span class="lbl">身長 (cm)</span>
        <input type="number" id="p-height" inputmode="decimal" step="0.1" placeholder="170">
      </label>
      <div class="field-row">
        <label class="field">
          <span class="lbl">目標体重 (kg)</span>
          <input type="number" id="p-goal" inputmode="decimal" step="0.1" placeholder="60">
        </label>
        <label class="field">
          <span class="lbl">目標日</span>
          <input type="date" id="p-target">
        </label>
      </div>
      <label class="field">
        <span class="lbl">開始体重 (kg) <small style="font-weight:400">未入力なら最古の記録を使用</small></span>
        <input type="number" id="p-start" inputmode="decimal" step="0.1" placeholder="自動">
      </label>
      <button class="btn-primary" id="btn-save-profile">プロフィールを保存</button>
    </div>

    <div class="settings-group">データ移行・バックアップ</div>
    <div class="card">
      <p class="card-title">recstyle からの乗り換え</p>
      <p class="hint" style="margin-top:0">recstyle アプリでエクスポートした CSV を読み込みます。日付・体重・体脂肪率・メモの列を自動判別します。既存の同じ日付の記録は上書きされます。</p>
      <button class="btn-outline" id="btn-import-recstyle" style="width:100%;margin-top:var(--space-3)">recstyle CSV を読み込む</button>
      <input type="file" id="file-recstyle" accept=".csv,text/csv" hidden>

      <hr class="hr">
      <p class="card-title">バックアップ（JSON）</p>
      <div class="btn-row">
        <button class="btn-ghost" id="btn-export">エクスポート</button>
        <button class="btn-ghost" id="btn-import-json">インポート</button>
      </div>
      <input type="file" id="file-json" accept=".json,application/json" hidden>
      <p class="hint">機種変更・データ引き継ぎ用。定期的に保存してください（iOS はストレージが消える場合があります）。</p>
    </div>

    <div class="settings-group">その他</div>
    <div class="card">
      <button class="btn-danger" id="btn-clear" style="width:100%">すべてのデータを削除</button>
      <p class="hint" id="app-meta"></p>
    </div>
  </section>
</main>

<button class="fab" id="fab" aria-label="記録を追加">＋</button>

<nav class="bottom">
  <button data-view="home" class="active"><span class="ico">🏠</span>ホーム</button>
  <button data-view="chart"><span class="ico">📈</span>グラフ</button>
  <button data-view="record"><span class="ico">✏️</span>記録</button>
  <button data-view="history"><span class="ico">📋</span>履歴</button>
  <button data-view="settings"><span class="ico">⚙️</span>設定</button>
</nav>

<div class="toast" id="toast"></div>

<script src="./app.js"></script>
</body>
</html>
