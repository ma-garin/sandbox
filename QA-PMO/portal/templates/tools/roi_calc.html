{% extends "tools/_layout.html" %}
{% block tool %}
<p class="tool-desc">バリデーション研究（事前登録 commit <code>1024e21</code>、対象: Saleor Commerce本番障害20件）の捕捉率データを使い、観点ライブラリ導入効果を試算します。グラフは <code>Chart.js</code> で描画。</p>
<div class="roi-disclaimer">⚑ 本試算はシミュレーションです。実際の効果は開発規模・障害特性によって異なります。</div>
<form method="post" hx-post="." hx-target="#tool-result" hx-swap="innerHTML" hx-indicator="#roi-spin">
  {% csrf_token %}
  <div class="form-grid">
    <label class="lbl">業種
      <select name="industry" class="inp">
        {% for key, ind in industries.items %}<option value="{{ key }}" {% if key == industry %}selected{% endif %}>{{ ind.label }}</option>{% endfor %}
      </select>
    </label>
    <label class="lbl">年間本番障害件数（推定）<input name="incidents" class="inp" type="number" min="1" value="{{ incidents }}"></label>
    <label class="lbl">障害1件あたりコスト（万円）<input name="cost" class="inp" type="number" min="1" value="{{ cost }}"></label>
    <label class="lbl">現在のテスト設計アプローチ
      <select name="method" class="inp">
        {% for val, lbl in methods %}<option value="{{ val }}" {% if val == method %}selected{% endif %}>{{ lbl }}</option>{% endfor %}
      </select>
    </label>
  </div>
  <div class="tool-actions">
    <button class="btn-primary" type="submit">ROIを試算する</button>
    <span id="roi-spin" class="htmx-indicator spin">試算中…</span>
  </div>
</form>

<div id="tool-result">
  {% include "tools/_partials/roi_calc_result.html" %}
</div>
{% endblock %}
